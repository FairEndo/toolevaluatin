# GitLab CI Configuration for CI Benchmark Runner
#
# GitHub is the VCS — GitLab is used purely as a CI runner.
# This pipeline runs sysbench benchmarks on the GitLab SaaS small-amd64
# runner (the only size available on GitLab Free tier) and pushes
# results back to the GitHub repository.
#
# NOTE: Additional runner sizes (medium, large, ARM) require a
#       GitLab Premium or Ultimate subscription.
#
# ── Triggering ──────────────────────────────────────────────────────
#
# Pipelines are only triggered explicitly — there are no automatic
# runs on push/mirror sync.
#
# Via GitLab UI:
#   Go to Build > Pipelines > Run pipeline.
#
# Via API:
#   curl -X POST "https://gitlab.com/api/v4/projects/${PROJECT_ID}/trigger/pipeline" \
#     -F "token=${TRIGGER_TOKEN}" \
#     -F "ref=main"
#
# ── Required CI/CD Variables ────────────────────────────────────────
#
# RESULTS_REPO_TOKEN — A GitHub PAT (or fine-grained token) with push access
#                      to the results repository. Set in GitLab under
#                      Settings > CI/CD > Variables (masked & protected).
# RESULTS_REPO      — (Optional) GitHub repo for results, e.g. "owner/ci-benchmark-results".
#                      Defaults to "${CI_PROJECT_NAMESPACE}/ci-benchmark-results".
# ────────────────────────────────────────────────────────────────────

# Only run when explicitly triggered via GitLab UI or API.
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "trigger"
    - if: $CI_PIPELINE_SOURCE == "api"

stages:
  - benchmark

# ── Hidden template job ─────────────────────────────────────────────
.benchmark:
  stage: benchmark
  image: ubuntu:24.04
  variables:
    CI_BENCH_PROVIDER: gitlab
    CI_BENCH_RESULTS_DIR: /tmp/results-repo
  before_script:
    - apt-get update && apt-get install -y sysbench jq git
  script:
    # Clone the external results repo
    - bash scripts/clone-results.sh

    # Run the benchmark (results written to /tmp/results-repo)
    - bash benchmarks/run.sh

    # Commit and push results to the results repo
    - bash scripts/push-results.sh "gitlab" "$CI_BENCH_RUNNER"

# ── Concrete jobs ───────────────────────────────────────────────────

benchmark-small:
  extends: .benchmark
  tags:
    - saas-linux-small-amd64
  variables:
    CI_BENCH_PROVIDER: gitlab
    CI_BENCH_RUNNER: small-amd64
  rules:
    - when: always
