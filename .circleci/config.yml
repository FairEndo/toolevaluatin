# CircleCI Configuration for CI Benchmark Runner
#
# Runs benchmarks on both Docker and machine (VM) executors to compare
# container-overhead vs bare-metal performance on the same resource classes.
#
# Trigger via API (medium only — Docker + machine):
#   curl -X POST "https://circleci.com/api/v2/project/gh/OWNER/REPO/pipeline" \
#     -H "Circle-Token: $TOKEN" \
#     -H "Content-Type: application/json" \
#     -d '{"parameters": {"run_benchmark": true}}'
#
# Trigger via API (all resource classes — Docker + machine + macOS):
#   curl -X POST "https://circleci.com/api/v2/project/gh/OWNER/REPO/pipeline" \
#     -H "Circle-Token: $TOKEN" \
#     -H "Content-Type: application/json" \
#     -d '{"parameters": {"run_benchmark": true, "run_all": true}}'
#
# Note: Requires a user key or deploy key with write access for pushing results.

version: 2.1

parameters:
  run_benchmark:
    type: boolean
    default: false
  run_all:
    type: boolean
    default: false

commands:
  record-job-start:
    description: Record the time the job started executing
    steps:
      - run:
          name: Record job start time
          command: echo "export CI_BENCH_JOB_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$BASH_ENV"

  fetch-trigger-time:
    description: Fetch pipeline creation time from CircleCI API
    steps:
      - run:
          name: Fetch pipeline trigger time
          command: |
            TRIGGER_TIME=$(curl -sf "https://circleci.com/api/v2/pipeline/${CIRCLE_PIPELINE_ID}" \
              -H "Circle-Token: ${CIRCLECI_CLI_TOKEN:-}" | jq -r '.created_at // empty')
            if [[ -z "$TRIGGER_TIME" ]]; then
              echo "WARNING: Could not fetch pipeline trigger time, using current time" >&2
              TRIGGER_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            fi
            echo "export CI_BENCH_TRIGGER_TIME=$TRIGGER_TIME" >> "$BASH_ENV"

  install-deps:
    description: Install benchmark dependencies (Linux)
    steps:
      - run:
          name: Install dependencies
          command: |
            sudo apt-get update && sudo apt-get install -y sysbench jq fio build-essential wget
            HF_ARCH=$(dpkg --print-architecture)
            wget -qO /tmp/hyperfine.deb "https://github.com/sharkdp/hyperfine/releases/download/v1.19.0/hyperfine_1.19.0_${HF_ARCH}.deb" && sudo dpkg -i /tmp/hyperfine.deb

  install-deps-macos:
    description: Install benchmark dependencies (macOS)
    steps:
      - run:
          name: Install dependencies (macOS)
          command: brew install sysbench jq fio hyperfine

  clone-results-repo:
    description: Clone the external results repository
    steps:
      - run:
          name: Clone results repo
          command: bash scripts/clone-results.sh

  run-benchmark:
    description: Run the benchmark script
    parameters:
      runner:
        type: string
    steps:
      - run:
          name: Run benchmark
          environment:
            CI_BENCH_PROVIDER: circleci
            CI_BENCH_RUNNER: << parameters.runner >>
            CI_BENCH_RESULTS_DIR: /tmp/results-repo
          command: bash benchmarks/run.sh

  commit-and-push-results:
    description: Commit and push benchmark results to the results repo
    parameters:
      runner:
        type: string
    steps:
      - run:
          name: Push results
          command: bash scripts/push-results.sh "circleci" "<< parameters.runner >>"

  run-benchmark-local:
    description: Run the benchmark script with local output (for artifact collection)
    parameters:
      runner:
        type: string
    steps:
      - run:
          name: Run benchmark (local output)
          environment:
            CI_BENCH_PROVIDER: circleci
            CI_BENCH_RUNNER: << parameters.runner >>
            CI_BENCH_RESULTS_DIR: /tmp/benchmark-output
          command: |
            mkdir -p /tmp/benchmark-output/results/raw
            bash benchmarks/run.sh

  persist-benchmark-result:
    description: Persist benchmark result to workspace for collection
    steps:
      - persist_to_workspace:
          root: /tmp/benchmark-output
          paths:
            - results/raw/*.json

jobs:
  # ---------------------------------------------------------------------------
  # Linux Docker jobs
  # ---------------------------------------------------------------------------
  benchmark-medium:
    docker:
      - image: cimg/base:current
    resource_class: medium
    steps:
      - record-job-start
      - checkout
      - install-deps
      - fetch-trigger-time
      - clone-results-repo
      - run-benchmark:
          runner: medium
      - commit-and-push-results:
          runner: medium

  benchmark-medium-artifact:
    docker:
      - image: cimg/base:current
    resource_class: medium
    steps:
      - record-job-start
      - checkout
      - install-deps
      - fetch-trigger-time
      - run-benchmark-local:
          runner: medium
      - persist-benchmark-result

  benchmark-large-artifact:
    docker:
      - image: cimg/base:current
    resource_class: large
    steps:
      - record-job-start
      - checkout
      - install-deps
      - fetch-trigger-time
      - run-benchmark-local:
          runner: large
      - persist-benchmark-result

  benchmark-xlarge-artifact:
    docker:
      - image: cimg/base:current
    resource_class: xlarge
    steps:
      - record-job-start
      - checkout
      - install-deps
      - fetch-trigger-time
      - run-benchmark-local:
          runner: xlarge
      - persist-benchmark-result

  benchmark-arm-medium-artifact:
    docker:
      - image: cimg/base:current
    resource_class: arm.medium
    steps:
      - record-job-start
      - checkout
      - install-deps
      - fetch-trigger-time
      - run-benchmark-local:
          runner: arm.medium
      - persist-benchmark-result

  benchmark-arm-large-artifact:
    docker:
      - image: cimg/base:current
    resource_class: arm.large
    steps:
      - record-job-start
      - checkout
      - install-deps
      - fetch-trigger-time
      - run-benchmark-local:
          runner: arm.large
      - persist-benchmark-result

  # ---------------------------------------------------------------------------
  # Linux Machine (VM) jobs
  #
  # These are the bare-metal equivalents of the Docker jobs above.
  # Machine executors run in a dedicated VM — no container overlay filesystem,
  # no cgroup-imposed vCPU mismatch, no noisy-neighbor overhead from other
  # containers sharing the same host.  Comparing Docker vs machine results
  # for the same resource class isolates how much overhead Docker adds.
  # ---------------------------------------------------------------------------
  benchmark-machine-medium:
    machine:
      image: ubuntu-2404:current
    resource_class: medium
    steps:
      - record-job-start
      - checkout
      - install-deps
      - fetch-trigger-time
      - clone-results-repo
      - run-benchmark:
          runner: machine.medium
      - commit-and-push-results:
          runner: machine.medium

  benchmark-machine-medium-artifact:
    machine:
      image: ubuntu-2404:current
    resource_class: medium
    steps:
      - record-job-start
      - checkout
      - install-deps
      - fetch-trigger-time
      - run-benchmark-local:
          runner: machine.medium
      - persist-benchmark-result

  benchmark-machine-large-artifact:
    machine:
      image: ubuntu-2404:current
    resource_class: large
    steps:
      - record-job-start
      - checkout
      - install-deps
      - fetch-trigger-time
      - run-benchmark-local:
          runner: machine.large
      - persist-benchmark-result

  benchmark-machine-xlarge-artifact:
    machine:
      image: ubuntu-2404:current
    resource_class: xlarge
    steps:
      - record-job-start
      - checkout
      - install-deps
      - fetch-trigger-time
      - run-benchmark-local:
          runner: machine.xlarge
      - persist-benchmark-result

  benchmark-machine-arm-medium-artifact:
    machine:
      image: ubuntu-2404:current
    resource_class: arm.medium
    steps:
      - record-job-start
      - checkout
      - install-deps
      - fetch-trigger-time
      - run-benchmark-local:
          runner: machine.arm.medium
      - persist-benchmark-result

  benchmark-machine-arm-large-artifact:
    machine:
      image: ubuntu-2404:current
    resource_class: arm.large
    steps:
      - record-job-start
      - checkout
      - install-deps
      - fetch-trigger-time
      - run-benchmark-local:
          runner: machine.arm.large
      - persist-benchmark-result

  # ---------------------------------------------------------------------------
  # Linux Machine Gen2 (VM) jobs
  # ---------------------------------------------------------------------------
  benchmark-gen2-medium-artifact:
    machine:
      image: ubuntu-2404:current
    resource_class: medium.gen2
    steps:
      - record-job-start
      - checkout
      - install-deps
      - fetch-trigger-time
      - run-benchmark-local:
          runner: gen2.medium
      - persist-benchmark-result

  benchmark-gen2-large-artifact:
    machine:
      image: ubuntu-2404:current
    resource_class: large.gen2
    steps:
      - record-job-start
      - checkout
      - install-deps
      - fetch-trigger-time
      - run-benchmark-local:
          runner: gen2.large
      - persist-benchmark-result

  benchmark-gen2-xlarge-artifact:
    machine:
      image: ubuntu-2404:current
    resource_class: xlarge.gen2
    steps:
      - record-job-start
      - checkout
      - install-deps
      - fetch-trigger-time
      - run-benchmark-local:
          runner: gen2.xlarge
      - persist-benchmark-result

  benchmark-gen2-2xlarge-artifact:
    machine:
      image: ubuntu-2404:current
    resource_class: 2xlarge.gen2
    steps:
      - record-job-start
      - checkout
      - install-deps
      - fetch-trigger-time
      - run-benchmark-local:
          runner: gen2.2xlarge
      - persist-benchmark-result

  benchmark-gen2-2xlargeplus-artifact:
    machine:
      image: ubuntu-2404:current
    resource_class: 2xlarge+.gen2
    steps:
      - record-job-start
      - checkout
      - install-deps
      - fetch-trigger-time
      - run-benchmark-local:
          runner: gen2.2xlarge+
      - persist-benchmark-result

  # ---------------------------------------------------------------------------
  # macOS jobs (Apple Silicon — M4 Pro)
  # ---------------------------------------------------------------------------
  benchmark-macos-m4pro-medium-artifact:
    macos:
      xcode: "26.3.0"
    resource_class: m4pro.medium
    steps:
      - record-job-start
      - checkout
      - install-deps-macos
      - fetch-trigger-time
      - run-benchmark-local:
          runner: m4pro.medium
      - persist-benchmark-result

  benchmark-macos-m4pro-large-artifact:
    macos:
      xcode: "26.3.0"
    resource_class: m4pro.large
    steps:
      - record-job-start
      - checkout
      - install-deps-macos
      - fetch-trigger-time
      - run-benchmark-local:
          runner: m4pro.large
      - persist-benchmark-result

  # ---------------------------------------------------------------------------
  # Result collection
  # ---------------------------------------------------------------------------
  collect-results:
    docker:
      - image: cimg/base:current
    resource_class: small
    steps:
      - checkout
      - run:
          name: Install jq
          command: sudo apt-get update && sudo apt-get install -y jq
      - attach_workspace:
          at: /tmp/benchmark-artifacts
      - run:
          name: Clone results repo
          command: bash scripts/clone-results.sh
      - run:
          name: Collect and push results
          command: bash scripts/collect-and-push.sh "/tmp/benchmark-artifacts/results/raw" "circleci" "all"

# ---------------------------------------------------------------
# Workflow Trigger Model:
#
#   1. Tag push of "view-benchmark" → all 17 resource class/executor
#      combinations (via tag-all-benchmarks workflow)
#
#   2. API with run_benchmark: true → single medium benchmark
#      (Docker + machine, via run-benchmarks workflow)
#
#   3. API with run_benchmark: true, run_all: true → all 17
#      resource class/executor combinations
#      (via run-all-benchmarks workflow)
#
# Note: The CircleCI project trigger must be set to "Tag pushes"
# in the CircleCI web UI for tag-based triggering to work.
# ---------------------------------------------------------------

workflows:
  tag-all-benchmarks:
    when:
      not: << pipeline.parameters.run_benchmark >>
    jobs:
      # Docker
      - benchmark-medium-artifact:
          filters:
            tags:
              only: /^view-benchmark$/
            branches:
              ignore: /.*/
      - benchmark-large-artifact:
          filters:
            tags:
              only: /^view-benchmark$/
            branches:
              ignore: /.*/
      - benchmark-xlarge-artifact:
          filters:
            tags:
              only: /^view-benchmark$/
            branches:
              ignore: /.*/
      - benchmark-arm-medium-artifact:
          filters:
            tags:
              only: /^view-benchmark$/
            branches:
              ignore: /.*/
      - benchmark-arm-large-artifact:
          filters:
            tags:
              only: /^view-benchmark$/
            branches:
              ignore: /.*/
      # Machine (VM)
      - benchmark-machine-medium-artifact:
          filters:
            tags:
              only: /^view-benchmark$/
            branches:
              ignore: /.*/
      - benchmark-machine-large-artifact:
          filters:
            tags:
              only: /^view-benchmark$/
            branches:
              ignore: /.*/
      - benchmark-machine-xlarge-artifact:
          filters:
            tags:
              only: /^view-benchmark$/
            branches:
              ignore: /.*/
      - benchmark-machine-arm-medium-artifact:
          filters:
            tags:
              only: /^view-benchmark$/
            branches:
              ignore: /.*/
      - benchmark-machine-arm-large-artifact:
          filters:
            tags:
              only: /^view-benchmark$/
            branches:
              ignore: /.*/
      # Machine Gen2 (VM)
      - benchmark-gen2-medium-artifact:
          filters:
            tags:
              only: /^view-benchmark$/
            branches:
              ignore: /.*/
      - benchmark-gen2-large-artifact:
          filters:
            tags:
              only: /^view-benchmark$/
            branches:
              ignore: /.*/
      - benchmark-gen2-xlarge-artifact:
          filters:
            tags:
              only: /^view-benchmark$/
            branches:
              ignore: /.*/
      - benchmark-gen2-2xlarge-artifact:
          filters:
            tags:
              only: /^view-benchmark$/
            branches:
              ignore: /.*/
      - benchmark-gen2-2xlargeplus-artifact:
          filters:
            tags:
              only: /^view-benchmark$/
            branches:
              ignore: /.*/
      # macOS
      - benchmark-macos-m4pro-medium-artifact:
          filters:
            tags:
              only: /^view-benchmark$/
            branches:
              ignore: /.*/
      - benchmark-macos-m4pro-large-artifact:
          filters:
            tags:
              only: /^view-benchmark$/
            branches:
              ignore: /.*/
      # Collect all results
      - collect-results:
          requires:
            - benchmark-medium-artifact
            - benchmark-large-artifact
            - benchmark-xlarge-artifact
            - benchmark-arm-medium-artifact
            - benchmark-arm-large-artifact
            - benchmark-machine-medium-artifact
            - benchmark-machine-large-artifact
            - benchmark-machine-xlarge-artifact
            - benchmark-machine-arm-medium-artifact
            - benchmark-machine-arm-large-artifact
            - benchmark-gen2-medium-artifact
            - benchmark-gen2-large-artifact
            - benchmark-gen2-xlarge-artifact
            - benchmark-gen2-2xlarge-artifact
            - benchmark-gen2-2xlargeplus-artifact
            - benchmark-macos-m4pro-medium-artifact
            - benchmark-macos-m4pro-large-artifact
          filters:
            tags:
              only: /^view-benchmark$/
            branches:
              ignore: /.*/

  run-benchmarks:
    when:
      and:
        - << pipeline.parameters.run_benchmark >>
        - not: << pipeline.parameters.run_all >>
    jobs:
      - benchmark-medium
      - benchmark-machine-medium

  run-all-benchmarks:
    when:
      and:
        - << pipeline.parameters.run_benchmark >>
        - << pipeline.parameters.run_all >>
    jobs:
      # Docker
      - benchmark-medium-artifact
      - benchmark-large-artifact
      - benchmark-xlarge-artifact
      - benchmark-arm-medium-artifact
      - benchmark-arm-large-artifact
      # Machine (VM)
      - benchmark-machine-medium-artifact
      - benchmark-machine-large-artifact
      - benchmark-machine-xlarge-artifact
      - benchmark-machine-arm-medium-artifact
      - benchmark-machine-arm-large-artifact
      # Machine Gen2 (VM)
      - benchmark-gen2-medium-artifact
      - benchmark-gen2-large-artifact
      - benchmark-gen2-xlarge-artifact
      - benchmark-gen2-2xlarge-artifact
      - benchmark-gen2-2xlargeplus-artifact
      # macOS
      - benchmark-macos-m4pro-medium-artifact
      - benchmark-macos-m4pro-large-artifact
      # Collect all results
      - collect-results:
          requires:
            - benchmark-medium-artifact
            - benchmark-large-artifact
            - benchmark-xlarge-artifact
            - benchmark-arm-medium-artifact
            - benchmark-arm-large-artifact
            - benchmark-machine-medium-artifact
            - benchmark-machine-large-artifact
            - benchmark-machine-xlarge-artifact
            - benchmark-machine-arm-medium-artifact
            - benchmark-machine-arm-large-artifact
            - benchmark-gen2-medium-artifact
            - benchmark-gen2-large-artifact
            - benchmark-gen2-xlarge-artifact
            - benchmark-gen2-2xlarge-artifact
            - benchmark-gen2-2xlargeplus-artifact
            - benchmark-macos-m4pro-medium-artifact
            - benchmark-macos-m4pro-large-artifact
