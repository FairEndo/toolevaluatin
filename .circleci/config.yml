# CircleCI Configuration for CI Benchmark Runner
#
# Trigger via API (medium only):
#   curl -X POST "https://circleci.com/api/v2/project/gh/OWNER/REPO/pipeline" \
#     -H "Circle-Token: $TOKEN" \
#     -H "Content-Type: application/json" \
#     -d '{"parameters": {"run_benchmark": true}}'
#
# Trigger via API (all resource classes):
#   curl -X POST "https://circleci.com/api/v2/project/gh/OWNER/REPO/pipeline" \
#     -H "Circle-Token: $TOKEN" \
#     -H "Content-Type: application/json" \
#     -d '{"parameters": {"run_benchmark": true, "run_all": true}}'
#
# Note: Requires a user key or deploy key with write access for pushing results.

version: 2.1

parameters:
  run_benchmark:
    type: boolean
    default: false
  run_all:
    type: boolean
    default: false

commands:
  record-job-start:
    description: Record the time the job started executing
    steps:
      - run:
          name: Record job start time
          command: echo "export CI_BENCH_JOB_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$BASH_ENV"

  fetch-trigger-time:
    description: Fetch pipeline creation time from CircleCI API
    steps:
      - run:
          name: Fetch pipeline trigger time
          command: |
            TRIGGER_TIME=$(curl -sf "https://circleci.com/api/v2/pipeline/${CIRCLE_PIPELINE_ID}" \
              -H "Circle-Token: ${CIRCLECI_CLI_TOKEN:-}" | jq -r '.created_at // empty')
            if [[ -z "$TRIGGER_TIME" ]]; then
              echo "WARNING: Could not fetch pipeline trigger time, using current time" >&2
              TRIGGER_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            fi
            echo "export CI_BENCH_TRIGGER_TIME=$TRIGGER_TIME" >> "$BASH_ENV"

  install-deps:
    description: Install benchmark dependencies
    steps:
      - run:
          name: Install dependencies
          command: sudo apt-get update && sudo apt-get install -y sysbench jq

  clone-results-repo:
    description: Clone the external results repository
    steps:
      - run:
          name: Clone results repo
          command: bash scripts/clone-results.sh

  run-benchmark:
    description: Run the benchmark script
    parameters:
      runner:
        type: string
    steps:
      - run:
          name: Run benchmark
          environment:
            CI_BENCH_PROVIDER: circleci
            CI_BENCH_RUNNER: << parameters.runner >>
            CI_BENCH_RESULTS_DIR: /tmp/results-repo
          command: bash benchmarks/run.sh

  commit-and-push-results:
    description: Commit and push benchmark results to the results repo
    parameters:
      runner:
        type: string
    steps:
      - run:
          name: Push results
          command: bash scripts/push-results.sh "circleci" "<< parameters.runner >>"

  run-benchmark-local:
    description: Run the benchmark script with local output (for artifact collection)
    parameters:
      runner:
        type: string
    steps:
      - run:
          name: Run benchmark (local output)
          environment:
            CI_BENCH_PROVIDER: circleci
            CI_BENCH_RUNNER: << parameters.runner >>
            CI_BENCH_RESULTS_DIR: /tmp/benchmark-output
          command: |
            mkdir -p /tmp/benchmark-output/results/raw
            mkdir -p /tmp/benchmark-output/docs
            bash benchmarks/run.sh

  persist-benchmark-result:
    description: Persist benchmark result to workspace for collection
    steps:
      - persist_to_workspace:
          root: /tmp/benchmark-output
          paths:
            - results/raw/*.json

jobs:
  benchmark-medium:
    docker:
      - image: cimg/base:current
    resource_class: medium
    steps:
      - record-job-start
      - checkout
      - install-deps
      - fetch-trigger-time
      - clone-results-repo
      - run-benchmark:
          runner: medium
      - commit-and-push-results:
          runner: medium

  benchmark-medium-artifact:
    docker:
      - image: cimg/base:current
    resource_class: medium
    steps:
      - record-job-start
      - checkout
      - install-deps
      - fetch-trigger-time
      - run-benchmark-local:
          runner: medium
      - persist-benchmark-result

  benchmark-large-artifact:
    docker:
      - image: cimg/base:current
    resource_class: large
    steps:
      - record-job-start
      - checkout
      - install-deps
      - fetch-trigger-time
      - run-benchmark-local:
          runner: large
      - persist-benchmark-result

  benchmark-xlarge-artifact:
    docker:
      - image: cimg/base:current
    resource_class: xlarge
    steps:
      - record-job-start
      - checkout
      - install-deps
      - fetch-trigger-time
      - run-benchmark-local:
          runner: xlarge
      - persist-benchmark-result

  benchmark-arm-medium-artifact:
    docker:
      - image: cimg/base:current
    resource_class: arm.medium
    steps:
      - record-job-start
      - checkout
      - install-deps
      - fetch-trigger-time
      - run-benchmark-local:
          runner: arm.medium
      - persist-benchmark-result

  benchmark-arm-large-artifact:
    docker:
      - image: cimg/base:current
    resource_class: arm.large
    steps:
      - record-job-start
      - checkout
      - install-deps
      - fetch-trigger-time
      - run-benchmark-local:
          runner: arm.large
      - persist-benchmark-result

  collect-results:
    docker:
      - image: cimg/base:current
    resource_class: small
    steps:
      - checkout
      - run:
          name: Install jq
          command: sudo apt-get update && sudo apt-get install -y jq
      - attach_workspace:
          at: /tmp/benchmark-artifacts
      - run:
          name: Clone results repo
          command: bash scripts/clone-results.sh
      - run:
          name: Collect and push results
          command: bash scripts/collect-and-push.sh "/tmp/benchmark-artifacts/results/raw" "circleci" "all"

# ---------------------------------------------------------------
# Workflow Trigger Model:
#
#   1. Tag push of "view-benchmark" → all 5 resource classes
#      (via tag-all-benchmarks workflow)
#
#   2. API with run_benchmark: true → single medium benchmark
#      (via run-benchmarks workflow)
#
#   3. API with run_benchmark: true, run_all: true → all 5 resource classes
#      (via run-all-benchmarks workflow)
#
# Note: The CircleCI project trigger must be set to "Tag pushes"
# in the CircleCI web UI for tag-based triggering to work.
# ---------------------------------------------------------------

workflows:
  tag-all-benchmarks:
    when:
      not: << pipeline.parameters.run_benchmark >>
    jobs:
      - benchmark-medium-artifact:
          filters:
            tags:
              only: /^view-benchmark$/
            branches:
              ignore: /.*/
      - benchmark-large-artifact:
          filters:
            tags:
              only: /^view-benchmark$/
            branches:
              ignore: /.*/
      - benchmark-xlarge-artifact:
          filters:
            tags:
              only: /^view-benchmark$/
            branches:
              ignore: /.*/
      - benchmark-arm-medium-artifact:
          filters:
            tags:
              only: /^view-benchmark$/
            branches:
              ignore: /.*/
      - benchmark-arm-large-artifact:
          filters:
            tags:
              only: /^view-benchmark$/
            branches:
              ignore: /.*/
      - collect-results:
          requires:
            - benchmark-medium-artifact
            - benchmark-large-artifact
            - benchmark-xlarge-artifact
            - benchmark-arm-medium-artifact
            - benchmark-arm-large-artifact
          filters:
            tags:
              only: /^view-benchmark$/
            branches:
              ignore: /.*/

  run-benchmarks:
    when:
      and:
        - << pipeline.parameters.run_benchmark >>
        - not: << pipeline.parameters.run_all >>
    jobs:
      - benchmark-medium

  run-all-benchmarks:
    when:
      and:
        - << pipeline.parameters.run_benchmark >>
        - << pipeline.parameters.run_all >>
    jobs:
      - benchmark-medium-artifact
      - benchmark-large-artifact
      - benchmark-xlarge-artifact
      - benchmark-arm-medium-artifact
      - benchmark-arm-large-artifact
      - collect-results:
          requires:
            - benchmark-medium-artifact
            - benchmark-large-artifact
            - benchmark-xlarge-artifact
            - benchmark-arm-medium-artifact
            - benchmark-arm-large-artifact
