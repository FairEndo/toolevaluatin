name: CI Benchmark

on:
  push:
    tags:
      - "view-benchmark"

permissions:
  contents: write

env:
  RESULTS_REPO: ${{ github.repository_owner }}/ci-benchmark-results

jobs:
  benchmark-matrix:
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - ubuntu-24.04
          - ubuntu-22.04
          # - ubuntu-latest-4-cores   # Requires org-provisioned larger runner
          # - ubuntu-latest-8-cores   # Requires org-provisioned larger runner
          # - ubuntu-latest-16-cores  # Requires org-provisioned larger runner
          - macos-latest
          - macos-13
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Record job start time
        run: echo "CI_BENCH_JOB_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y sysbench jq

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install sysbench jq

      - name: Fetch pipeline trigger time
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TRIGGER_TIME=$(gh api "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}" --jq '.created_at')
          echo "CI_BENCH_TRIGGER_TIME=$TRIGGER_TIME" >> "$GITHUB_ENV"

      - name: Run benchmark
        env:
          CI_BENCH_PROVIDER: github-actions
          CI_BENCH_RUNNER: ${{ matrix.runner }}
          CI_BENCH_RESULTS_DIR: /tmp/benchmark-output
          CI_BENCH_TRIGGER_TIME: ${{ env.CI_BENCH_TRIGGER_TIME }}
          CI_BENCH_JOB_STARTED_AT: ${{ env.CI_BENCH_JOB_STARTED_AT }}
        run: |
          mkdir -p /tmp/benchmark-output/results/raw
          mkdir -p /tmp/benchmark-output/docs
          bash benchmarks/run.sh

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.runner }}
          path: /tmp/benchmark-output/results/raw/*.json
          retention-days: 1

  collect-results:
    needs: [benchmark-matrix]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Download all benchmark artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/benchmark-artifacts
          pattern: benchmark-*
          merge-multiple: true

      - name: Clone results repo
        env:
          RESULTS_REPO_TOKEN: ${{ secrets.RESULTS_REPO_TOKEN }}
          RESULTS_REPO: ${{ env.RESULTS_REPO }}
        run: |
          bash scripts/clone-results.sh
          echo "CI_BENCH_RESULTS_DIR=/tmp/results-repo" >> "$GITHUB_ENV"

      - name: Collect and push results
        env:
          RESULTS_CLONE_DIR: /tmp/results-repo
        run: bash scripts/collect-and-push.sh "/tmp/benchmark-artifacts" "github-actions" "matrix"
